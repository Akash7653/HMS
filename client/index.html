<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Book premium hotels worldwide with AI-powered recommendations, dynamic pricing, and real-time availability. Experience the future of hotel booking with Horizon Hotels." />
    <meta name="keywords" content="hotel booking, luxury hotels, travel, accommodation, AI recommendations, dynamic pricing" />
    <meta name="author" content="Horizon Hotels" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Horizon Hotels" />
    <meta name="application-name" content="Horizon Hotels" />
    <meta name="msapplication-TileColor" content="#3b82f6" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png" />
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://maps.googleapis.com" />
    <link rel="preconnect" href="https://api.mapbox.com" />
    
    <!-- DNS prefetch for performance -->
    <link rel="dns-prefetch" href="//cdn.example.com" />
    <link rel="dns-prefetch" href="//images.unsplash.com" />
    
    <title>Horizon Hotels - Premium Hotel Booking Platform</title>
    
    <!-- Critical CSS for PWA -->
    <style>
      /* Loading skeleton and critical styles */
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f8fafc;
      }
      
      .loading-skeleton {
        animation: pulse 2s infinite;
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        border-radius: 4px;
      }
      
      @keyframes pulse {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      
      /* Splash screen for PWA */
      .splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        color: white;
      }
      
      .splash-icon {
        width: 80px;
        height: 80px;
        margin-bottom: 1rem;
        animation: float 3s ease-in-out infinite;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      
      .splash-text {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      
      .splash-subtitle {
        font-size: 1rem;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen -->
    <div id="splash-screen" class="splash-screen">
      <svg class="splash-icon" viewBox="0 0 24 24" fill="white">
        <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/>
      </svg>
      <div class="splash-text">Horizon Hotels</div>
      <div class="splash-subtitle">Loading your experience...</div>
    </div>
    
    <!-- Main App Container -->
    <div id="root"></div>
    
    <!-- PWA Installation Script -->
    <script>
      // Hide splash screen when app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splashScreen = document.getElementById('splash-screen');
          if (splashScreen) {
            splashScreen.style.opacity = '0';
            splashScreen.style.transition = 'opacity 0.5s ease';
            setTimeout(() => splashScreen.remove(), 500);
          }
        }, 1000);
      });
      
      // Handle online/offline status
      window.addEventListener('online', () => {
        console.log('App is online');
        document.body.classList.remove('offline');
      });
      
      window.addEventListener('offline', () => {
        console.log('App is offline');
        document.body.classList.add('offline');
      });
      
      // Check initial status
      if (!navigator.onLine) {
        document.body.classList.add('offline');
      }
    </script>
    
    <!-- Main App Script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
